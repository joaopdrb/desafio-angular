<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Usuários</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --toolbar-bg: #4a4a4a;
      --toolbar-text: #ffffff;
      --toolbar-height: 48px;
      --page-bg: #eeeeee;
      --card-bg: #ffffff;
      --card-border: #e0e0e0;
      --text-primary: #212121;
      --text-secondary: #757575;
      --accent: #e53935;
      --accent-hover: #c62828;
      --icon-color: #9e9e9e;
      --search-bg: rgba(255,255,255,0.15);
      --search-focus: rgba(255,255,255,0.25);
      --divider: #e0e0e0;
      --row-hover: #f5f5f5;
      --shadow-fab: 0 4px 12px rgba(229,57,53,0.45);
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--page-bg);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      height: var(--toolbar-height);
      background: var(--toolbar-bg);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.35);
    }

    .toolbar__menu {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
    }
    .toolbar__menu span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--toolbar-text);
      border-radius: 1px;
      transition: background .2s;
    }
    .toolbar__menu:hover span { background: #ccc; }

    .toolbar__title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--toolbar-text);
      white-space: nowrap;
      margin-right: 4px;
    }

    .toolbar__search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--search-bg);
      border-radius: 4px;
      padding: 0 12px;
      height: 34px;
      flex: 1;
      max-width: 360px;
      transition: background .2s;
    }
    .toolbar__search:focus-within { background: var(--search-focus); }
    .toolbar__search .material-icons {
      font-size: 18px;
      color: rgba(255,255,255,.65);
    }
    .toolbar__search input {
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Roboto', sans-serif;
      font-size: 13px;
      width: 100%;
    }
    .toolbar__search input::placeholder { color: rgba(255,255,255,.55); }

    /* ── Content ── */
    .content {
      padding: 24px 20px;
      max-width: 640px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .card__label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: .04em;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--divider);
    }

    /* ── User Row ── */
    .user-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--divider);
      transition: background .15s;
      animation: fadeSlideIn .3s ease both;
    }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: var(--row-hover); }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user-row__avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #bdbdbd;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .user-row__avatar .material-icons {
      font-size: 20px;
      color: #fff;
    }

    .user-row__info {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .user-row__name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 120px;
    }

    .user-row__email {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-row__edit {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--icon-color);
      transition: background .15s, color .15s;
      flex-shrink: 0;
    }
    .user-row__edit:hover {
      background: rgba(0,0,0,.06);
      color: var(--text-primary);
    }
    .user-row__edit .material-icons { font-size: 18px; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-fab);
      transition: background .2s, transform .2s, box-shadow .2s;
    }
    .fab:hover {
      background: var(--accent-hover);
      transform: scale(1.08);
      box-shadow: 0 6px 18px rgba(229,57,53,.5);
    }
    .fab:active { transform: scale(.96); }
    .fab .material-icons { color: #fff; font-size: 22px; }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <header class="toolbar">
    <button class="toolbar__menu" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <span class="toolbar__title">Usuários</span>
    <div class="toolbar__search">
      <span class="material-icons">search</span>
      <input type="text" placeholder="Pesquisar..." aria-label="Pesquisar usuários"/>
    </div>
  </header>

  <!-- Main content -->
  <main class="content">
    <div class="card">
      <div class="card__label">Usuários cadastrados</div>

      <!-- User row -->
      <div class="user-row">
        <div class="user-row__avatar">
          <span class="material-icons">person</span>
        </div>
        <div class="user-row__info">
          <span class="user-row__name">Giana Sandrini</span>
          <span class="user-row__email">giana@alternatus.com.br</span>
        </div>
        <button class="user-row__edit" aria-label="Editar usuário">
          <span class="material-icons">edit</span>
        </button>
      </div>

    </div>
  </main>

  <!-- FAB -->
  <button class="fab" aria-label="Adicionar usuário">
    <span class="material-icons">add</span>
  </button>

</body>
</html>
