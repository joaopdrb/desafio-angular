<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adicionar Novo Usuário</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal {
      background: #ffffff;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
    }

    .modal-title {
      font-size: 15px;
      font-weight: 600;
      color: #212121;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid #bdbdbd;
      border-radius: 0;
      padding: 6px 0;
      font-size: 14px;
      background: transparent;
      color: #212121;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-bottom-color: #1a73e8;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 1.25rem;
    }

    .phone-group {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .phone-group .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .phone-type select {
      width: auto;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      padding-bottom: 6px;
    }

    .info-text {
      font-size: 12px;
      color: #1a73e8;
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    .btn-salvar {
      background: #1a73e8;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-salvar:hover {
      background: #1558b0;
    }

    .btn-salvar:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <div class="overlay">
    <div class="modal">
      <p class="modal-title">Adicionar novo usuário</p>

      <div class="form-group">
        <label for="email">Usuário (e-mail) *</label>
        <input type="email" id="email" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="nome">Nome completo *</label>
        <input type="text" id="nome" autocomplete="off" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cpf">CPF *</label>
          <input type="text" id="cpf" autocomplete="off" />
        </div>

        <div class="phone-group">
          <div class="form-group">
            <label for="telefone">Número do telefone *</label>
            <input type="tel" id="telefone" autocomplete="off" />
          </div>
          <div class="phone-type">
            <select id="tipo-telefone" aria-label="Tipo de telefone">
              <option value="celular">CELULAR</option>
              <option value="fixo">FIXO</option>
            </select>
          </div>
        </div>
      </div>

      <p class="info-text">O usuário receberá uma senha provisória para acesso ao sistema por SMS.</p>

      <button class="btn-salvar" onclick="salvar(this)">SALVAR</button>
    </div>
  </div>

  <script>
    function salvar(btn) {
      const original = btn.textContent;
      btn.textContent = 'Salvando...';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = original;
        btn.disabled = false;
      }, 1500);
    }
  </script>

</body>
</html>
